name: eea
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  build:
    env:
      PY_COLORS: "1"
      DEBIAN_FRONTEND: "noninteractive"
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Set Locale
      run: |
        sudo apt-get update
        sudo apt-get install -y tzdata locales
        sudo locale-gen en_US.UTF-8
        sudo update-locale LANG=en_US.UTF-8
        echo "LANG=en_US.UTF-8" >> $GITHUB_ENV
        echo "LC_ALL=en_US.UTF-8" >> $GITHUB_ENV

    - name: Install WARP
      run: |
        echo "Setting up Cloudflare WARP..."
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install -y --no-install-recommends cloudflare-warp
        sudo warp-cli --accept-tos registration new || true
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect
        sleep 5
      shell: bash
      timeout-minutes: 3

    - name: Verify WARP Connection
      run: |
        echo "Checking WARP connection..."
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -q "warp=on" && echo "✓ WARP is active" || echo "⚠ WARP status unknown"
      shell: bash
      timeout-minutes: 1

    - name: Install Brave Browser
      run: |
        echo "Installing Brave Browser..."
        sudo apt-get install -y curl
        curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main" | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
        sudo apt-get update
        sudo apt-get install -y brave-browser
        brave-browser --version
      shell: bash
      timeout-minutes: 5

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade seleniumbase pyautogui pymongo python-xlib
      shell: bash
      timeout-minutes: 10

    - name: Install ChromeDriver
      run: |
        seleniumbase install chromedriver
      shell: bash
      timeout-minutes: 5

    - name: Verify Test Environment
      run: |
        python --version
        pip list | grep -E "seleniumbase|pyautogui|pymongo"
        which brave-browser
        brave-browser --version
      shell: bash

    - name: Run Tests with Brave
      run: |
        python vermi.py --brave --incognito --do-not-track --xvfb --screenshot
      shell: bash
      timeout-minutes: 550
      continue-on-error: false

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: seleniumbase-screenshots
        path: ./latest_logs/
        retention-days: 1
        if-no-files-found: ignore

    - name: Generate Test Report
      if: always()
      run: |
        echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "- Python Version: $(python --version)" >> $GITHUB_STEP_SUMMARY
        echo "- Brave Browser: $(brave-browser --version)" >> $GITHUB_STEP_SUMMARY
      shell: bash
